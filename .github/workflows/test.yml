---
concurrency:
    cancel-in-progress: true
    group: ${{ github.workflow }}-${{ github.ref }}
jobs:
    check_sonar_secret:
        name: check if SONAR_TOKEN is set in github secrets
        outputs:
            is_SONAR_TOKEN_set: ${{ steps.checksecret_job.outputs.is_SONAR_TOKEN_set }}
        runs-on: ubuntu-latest # renovate: runner
        steps:
            - env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              id: checksecret_job
              name: Check whether Sonar Scan should be done
              run: |
                  echo "is_SONAR_TOKEN_set: ${{ env.SONAR_TOKEN != '' }}"
                  echo "is_SONAR_TOKEN_set=${{ env.SONAR_TOKEN != '' }}" >> $GITHUB_OUTPUT
    docker-image:
        concurrency: release
        env:
            IMAGE_NAME: ${{ github.repository }}
            REGISTRY: ghcr.io
        if: needs.release.outputs.released == 'true'
        needs: release
        permissions:
            attestations: write
            contents: read
            id-token: write
            packages: write
        runs-on: ubuntu-latest # renovate: runner
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Log in to the container registry
              uses: docker/login-action@c144859092e8e353f3e118b0b329679a62351c3e
              with:
                  password: ${{ secrets.GITHUB_TOKEN }}
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
            - id: meta
              name: Extract metadata (tags, labels) for Docker
              uses: docker/metadata-action@dde548f1603e003959483c86c72ec03454216f9c
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            - id: push
              name: Build and push Docker image
              uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
              with:
                  context: .
                  labels: ${{ steps.meta.outputs.labels }}
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
              with:
                  push-to-registry: true
                  subject-digest: ${{ steps.push.outputs.digest }}
                  subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
    lint:
        name: Lint with ruff and ty
        runs-on: ubuntu-latest # renovate: runner
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
              with:
                  cache: true
            - name: Run ruff
              run: pixi run --environment dev ruff check src tests --output-format json --output-file ruff.json
            - if: github.event_name == 'pull_request'
              name: Ruff for GitHub annotations
              run: pixi run --environment dev ruff check src tests --output-format github
            - if: success() || failure()
              name: Upload ruff report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: ruff-${{ github.run_id }}
                  path: ruff.json
                  retention-days: 1
            - name: Run type checks
              run: pixi run --environment dev ty check src tests --output-format github
    release:
        concurrency: release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' &&
            !contains(github.event.head_commit.message, 'chore(release):')
        needs: test
        outputs:
            released: ${{ steps.release.outputs.released }}
        permissions:
            contents: write
            id-token: write
        runs-on: ubuntu-latest # renovate: runner
        steps:
            # Note: we need to checkout the repository at the workflow sha in case during the workflow
            # the branch was updated. To keep PSR working with the configured release branches,
            # we force a checkout of the desired release branch but at the workflow sha HEAD.
            - name: Setup | Checkout Repository at workflow sha
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.sha }}
            - name: Setup | Force correct release branch on workflow sha
              run: |
                  git checkout -B ${{ github.ref_name }} ${{ github.sha }}
            - name: Setup | Install UV
              uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
              with:
                  enable-cache: true
                  version: latest
            - name: Setup | Install Python
              run: uv python install
            - id: release
              name: Action | Semantic Version Release
              # Adjust tag with desired version if applicable.
              uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
              with:
                  git_committer_email: "actions@users.noreply.github.com"
                  git_committer_name: "github-actions"
                  github_token: ${{ secrets.GITHUB_TOKEN }}
            - if: steps.release.outputs.released == 'true'
              name: Publish | Upload to GitHub Release Assets
              uses: python-semantic-release/publish-action@310a9983a0ae878b29f3aac778d7c77c1db27378 # v10.5.3
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  tag: ${{ steps.release.outputs.tag }}
    sonar:
        concurrency: release
        needs:
            - lint
            - test
            - check_sonar_secret
        runs-on: ubuntu-latest # renovate: runner
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
              with:
                  cache: true
            - id: proj-version
              name: Obtain Project Version
              run: |
                  pixi run python - <<'PYTHON'
                  import os
                  import tomllib
                  from pathlib import Path

                  data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
                  version = data["project"]["version"]

                  with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as fh:
                      print(f"version={version}", file=fh)
                  PYTHON
            - name: Cache SonarQube packages
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  key: ${{ runner.os }}-sonar
                  path: ~/.sonar/cache
                  restore-keys: ${{ runner.os }}-sonar
            - env:
                  PARALLEL_DOWNLOADS: 1
              name: Download JUnit reports
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  merge-multiple: true
                  path: .
            - env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              name: SonarCloud Scan
              uses: SonarSource/sonarqube-scan-action@55e44800a8f495208cce6e4e82f5dedb45fcf0ef # v7.2
              with:
                  args: >
                      -Dsonar.projectVersion=${{ steps.proj-version.outputs.version }}

    test:
        name: test with ${{ matrix.python-environment }} on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0
            - name: Setup Pixi
              uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
              with:
                  cache: true
            - env:
                  AOC_SESSION: "${{ secrets.AOC_SESSION }}"
                  COVERAGE_XML: "coverage-${{ matrix.os }}-${{ matrix.python-environment }}.xml"
                  JUNIT_XML: "junit-${{ matrix.os }}-${{ matrix.python-environment }}.xml"
              name: Run test suite
              run: pixi run --environment ${{ matrix.python-environment }} pytest -vv --junit-xml=${{
                  env.JUNIT_XML }} --cov-report=xml:${{ env.COVERAGE_XML }}
            - if: success() || failure()
              name: Upload JUnit results
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: junit-${{ matrix.os }}-${{ matrix.python-environment }}
                  path: |
                      coverage-*.xml
                      junit-*.xml
                  retention-days: 1
            - if: success() || failure()
              name: Publish Test Report
              uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
              with:
                  name: Tox Tests (${{ matrix.python-environment }})
                  path: "junit-*.xml"
                  reporter: java-junit
        strategy:
            fail-fast: false
            matrix:
                os:
                    - macos-15 # renovate: runner
                    - ubuntu-24.04 # renovate: runner
                    - windows-2025 # renovate: runner
                python-environment:
                    - py312
                    - py313
                    - py314
name: Test
on:
    merge_group:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
    push:
        branches:
            - main
        tags:
            - "*"
